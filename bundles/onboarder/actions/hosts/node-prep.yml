---
- name: Configure RKE2 host prerequisites
  hosts: all
  become: true
  gather_facts: true

  vars:
    selinux_mode: enforcing

    kubectl_version: "1.34.1"
    kubectl_install_path: /usr/local/bin/kubectl
    kubectl_arch_map:
      x86_64: amd64
      aarch64: arm64
      arm64: arm64
    kubectl_arch: "{{ kubectl_arch_map[ansible_architecture] | default(ansible_architecture) }}"

    rke2_selinux_package_pattern: "rke2-selinux-0.22*"

    tuned_profile: latency-performance
    osdc_kernel_args: "intel_idle.max_cstate=0 processor.max_cstate=1"

    required_packages:
      - ansible-core
      - bash-completion
      - bind-utils
      - bzip2
      - chrony
      - container-selinux
      - diffutils
      - iptables
      - ipvsadm
      - iscsi-initiator-utils
      - lshw
      - make
      - nfs-utils
      - numactl
      - pciutils
      - tar
      - tuned
      - unzip
      - wget
      - zip
      - grubby

    optional_packages:
      - jq
      - lsof
      - mlocate
      - net-tools
      - nmap-ncat
      - screen
      - skopeo
      - tcpdump
      - tree
      - yq

    osdc_packages:
      - pciutils
      - lshw

    firewall_services:
      - firewalld
      - nftables
      - iptables
      - ip6tables

    osdc_disabled_services:
      - irqbalance
      - httpd

    kube_vip_modules:
      - ip_vs
      - ip_vs_rr
      - wireguard

    sysctl_substrate_settings:
      fs.inotify.max_user_instances: "12288"
      fs.inotify.max_user_watches: "524288"
      net.core.rmem_default: "16777216"
      net.core.rmem_max: "16777216"
      net.core.wmem_default: "16777216"
      net.core.wmem_max: "16777216"
      net.ipv4.tcp_mem: "67108864 67108864 67108864"
      net.ipv4.udp_mem: "16777216 16777216 16777216"
      net.ipv4.ip_forward: "1"

  pre_tasks:
    - name: Require RHEL-family OS
      ansible.builtin.assert:
        that:
          - ansible_os_family == "RedHat"
        fail_msg: "This playbook is intended for RHEL/Rocky/Alma/RHEL-compatible systems."

  tasks:
    - name: Install required packages
      ansible.builtin.dnf:
        name: "{{ required_packages }}"
        state: present
        update_cache: true

    - name: Install pinned rke2-selinux package
      ansible.builtin.dnf:
        name: "{{ rke2_selinux_package_pattern }}"
        state: present

    - name: Configure SELinux mode persistently
      ansible.builtin.lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: "SELINUX={{ selinux_mode }}"

    - name: Check whether SELinux is enabled
      ansible.builtin.command: selinuxenabled
      register: selinux_enabled
      changed_when: false
      failed_when: false

    - name: Set SELinux enforcing immediately
      ansible.builtin.command: setenforce 1
      when:
        - selinux_mode == "enforcing"
        - selinux_enabled.rc == 0
      changed_when: true

    - name: Set SELinux permissive immediately
      ansible.builtin.command: setenforce 0
      when:
        - selinux_mode == "permissive"
        - selinux_enabled.rc == 0
      changed_when: true

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Disable firewall services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ firewall_services }}"
      when: item ~ '.service' in ansible_facts.services

    - name: Enable and start chronyd
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true
      when: "'chronyd.service' in ansible_facts.services"

    - name: Check current kubectl version
      ansible.builtin.command: "{{ kubectl_install_path }} version --client"
      register: kubectl_current
      changed_when: false
      failed_when: false

    - name: Install kubectl {{ kubectl_version }}
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/{{ kubectl_arch }}/kubectl"
        dest: "{{ kubectl_install_path }}"
        owner: root
        group: root
        mode: "0755"
      when: kubectl_current.rc != 0 or kubectl_version not in kubectl_current.stdout

    - name: Create root kube completion directory
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Generate kubectl bash completion for root
      ansible.builtin.shell: |
        set -euo pipefail
        {{ kubectl_install_path }} completion bash > /root/.kube/completion.bash.inc
      args:
        executable: /bin/bash

    - name: Configure root kubectl environment in bashrc
      ansible.builtin.blockinfile:
        path: /root/.bashrc
        create: true
        owner: root
        group: root
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED RKE2 KUBECTL"
        block: |
          export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
          case ":$PATH:" in
            *:/usr/local/bin:*) ;;
            *) export PATH="$PATH:/usr/local/bin" ;;
          esac
          [ -f "$HOME/.kube/completion.bash.inc" ] && source "$HOME/.kube/completion.bash.inc"

    - name: Configure root kubectl environment in bash_profile
      ansible.builtin.blockinfile:
        path: /root/.bash_profile
        create: true
        owner: root
        group: root
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED RKE2 KUBECTL"
        block: |
          export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
          case ":$PATH:" in
            *:/usr/local/bin:*) ;;
            *) export PATH="$PATH:/usr/local/bin" ;;
          esac
          [ -f "$HOME/.kube/completion.bash.inc" ] && source "$HOME/.kube/completion.bash.inc"

    - name: Load kube-vip kernel modules
      ansible.builtin.command: "modprobe {{ item }}"
      loop: "{{ kube_vip_modules }}"
      changed_when: false

    - name: Persist kube-vip kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/kube-vip.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          ip_vs
          ip_vs_rr
          wireguard

    - name: Create RKE2 config directory
      ansible.builtin.file:
        path: /etc/rancher/rke2/config.yaml.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create Rancher RKE2 default registry config
      ansible.builtin.copy:
        dest: /etc/rancher/rke2/config.yaml.d/60-rancher.yaml
        owner: root
        group: root
        mode: "0644"
        content: |
          {
            "system-default-registry": ""
          }

    - name: Install OSDC-specific packages
      ansible.builtin.dnf:
        name: "{{ osdc_packages }}"
        state: present
      when: cluster_type | default('') == 'osdc'

    - name: Disable OSDC services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ osdc_disabled_services }}"
      when:
        - cluster_type | default('') == 'osdc'
        - item ~ '.service' in ansible_facts.services

    - name: Check current tuned profile
      ansible.builtin.command: tuned-adm active
      register: tuned_active
      changed_when: false
      failed_when: false
      when: cluster_type | default('') == 'osdc'

    - name: Set tuned profile for OSDC
      ansible.builtin.command: "tuned-adm profile {{ tuned_profile }}"
      register: tuned_profile_result
      changed_when: true
      when:
        - cluster_type | default('') == 'osdc'
        - tuned_profile not in tuned_active.stdout | default('')

    - name: Create substrate sysctl config
      ansible.builtin.copy:
        dest: /etc/sysctl.d/50-substrate.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          {% for key, value in sysctl_substrate_settings.items() %}
          {{ key }}={{ value }}
          {% endfor %}
      register: substrate_sysctl_config
      when: cluster_type | default('') == 'osdc'

    - name: Reload sysctl because substrate config changed
      ansible.builtin.command: sysctl --system
      register: sysctl_reload_result
      changed_when: true
      when:
        - cluster_type | default('') == 'osdc'
        - substrate_sysctl_config.changed | default(false)

    - name: Read current kernel command line
      ansible.builtin.command: cat /proc/cmdline
      register: proc_cmdline
      changed_when: false
      when: cluster_type | default('') == 'osdc'

    - name: Add OSDC kernel boot parameters
      ansible.builtin.command: >
        grubby --update-kernel=ALL
        --args="{{ osdc_kernel_args }}"
      register: osdc_kernel_args_update
      changed_when: true
      when:
        - cluster_type | default('') == 'osdc'
        - "'intel_idle.max_cstate=0' not in proc_cmdline.stdout
          or 'processor.max_cstate=1' not in proc_cmdline.stdout"

    - name: Report reboot requirement for OSDC kernel parameters
      ansible.builtin.debug:
        msg: "OSDC kernel boot parameters were updated. Reboot is required before /proc/cmdline reflects the change."
      when:
        - cluster_type | default('') == 'osdc'
        - osdc_kernel_args_update.changed | default(false)

    - name: Manual OSDC BIOS, SR-IOV, and driver reminder
      ansible.builtin.debug:
        msg:
          - "Manual OSDC checks still required:"
          - "BIOS: System Profile > Custom > Performance."
          - "Turbo Boost: Disabled."
          - "SR-IOV Global Enable: Enabled."
          - "Device Virtual Mode: SR-IOV."
          - "PCI Virtual Functions: 64."
          - "Updated drivers required where applicable: iavf, i40e, ice."
      when: cluster_type | default('') == 'osdc'