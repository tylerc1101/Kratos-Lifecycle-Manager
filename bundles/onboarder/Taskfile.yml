version: '3'

vars:
  CONTAINER_NAME: '{{default "klm-onboarder" .ONBOARDER_CONTAINER_NAME}}'
  IMAGE_REF_FILE: '{{.KLM_STATE_DIR}}/onboarder-image-ref'
  IMAGE_ARCHIVE:
    sh: |
      find "{{.KLM_BUNDLE_DIR}}/files" -maxdepth 1 -type f \( -name "*.tar" -o -name "*.tar.gz" -o -name "*.tgz" \) | sort | tail -n1
  RUNTIME:
    sh: |
      if command -v podman >/dev/null 2>&1; then
        echo podman
      elif command -v docker >/dev/null 2>&1; then
        echo docker
      else
        echo missing
      fi

tasks:
  preflight:
    cmds:
      - |
          test "{{.RUNTIME}}" != "missing" || {
            echo "podman or docker is required"
            exit 1
          }
      - |
          test -n "{{.IMAGE_ARCHIVE}}" || {
            echo "No onboarder image archive found in {{.KLM_BUNDLE_DIR}}/files"
            echo "Copy your onboarder image tar into the onboarder bundle files/ directory before packaging."
            exit 1
          }

  load:
    desc: Load onboarder container image
    deps: [preflight]
    cmds:
      - mkdir -p "{{.KLM_STATE_DIR}}"
      - |
          set -euo pipefail
          output="$({{.RUNTIME}} load -i "{{.IMAGE_ARCHIVE}}" 2>&1 | tee /dev/stderr)"
          image_ref="$(printf '%s\n' "$output" | sed -nE 's/^Loaded image: //p; s/^Loaded image\(s\): //p' | tail -n1 | xargs || true)"
          if [ -z "$image_ref" ]; then
            echo "Could not parse image ref from runtime load output."
            exit 1
          fi
          echo "$image_ref" > "{{.IMAGE_REF_FILE}}"
          echo "[onboarder] Loaded image: $image_ref"

  run:
    desc: Start onboarder container
    deps: [load]
    cmds:
      - |
          set -euo pipefail
          image_ref="$(cat "{{.IMAGE_REF_FILE}}")"

          if {{.RUNTIME}} ps -a --format '{{"{{"}}.Names{{"}}"}}' | grep -qx "{{.CONTAINER_NAME}}"; then
            {{.RUNTIME}} rm -f "{{.CONTAINER_NAME}}" >/dev/null
          fi

          {{.RUNTIME}} run -d \
            --name "{{.CONTAINER_NAME}}" \
            --hostname onboarder \
            -v "{{.KLM_ENV_DIR}}:/openspace/env/current:Z" \
            -v "{{.KLM_ARTIFACTS_DIR}}:/openspace/artifacts:Z" \
            -v "{{.KLM_BUNDLES_DIR}}:/openspace/bundles:Z" \
            -e "KLM_ENV_DIR=/openspace/env/current" \
            -e "KLM_CONFIG=/openspace/env/current/deployment.yml" \
            "$image_ref" \
            /bin/bash -lc "sleep infinity"

          echo "[onboarder] Container started: {{.CONTAINER_NAME}}"

  apply:
    desc: Run onboarder deployment
    deps: [run]
    cmds:
      - |
          {{.RUNTIME}} exec "{{.CONTAINER_NAME}}" \
            bash -lc 'onboarder deploy --config /openspace/env/current/deployment.yml'

  verify:
    desc: Verify onboarder deployment
    cmds:
      - |
          {{.RUNTIME}} exec "{{.CONTAINER_NAME}}" \
            bash -lc 'onboarder verify --config /openspace/env/current/deployment.yml'

  shell:
    desc: Open onboarder shell
    interactive: true
    cmds:
      - '{{.RUNTIME}} exec -it "{{.CONTAINER_NAME}}" bash'

  stop:
    desc: Stop onboarder container
    cmds:
      - |
          if {{.RUNTIME}} ps -a --format '{{"{{"}}.Names{{"}}"}}' | grep -qx "{{.CONTAINER_NAME}}"; then
            {{.RUNTIME}} rm -f "{{.CONTAINER_NAME}}" >/dev/null
          fi
          echo "[onboarder] Container stopped/removed if it existed."
