version: '3'

vars:
  CONTAINER_NAME: '{{default "onboarder" .ONBOARDER_CONTAINER_NAME}}'
  IMAGE_REF: 'docker.io/onboarder/onboarder-full:v3.8.0'
  IMAGE_ARCHIVE: '{{.KLM_BUNDLES_DIR}}/onboarder/images/onboarder-full_v3.8.0.tar.gz'
  RUNTIME:
    sh: |
      if command -v podman >/dev/null 2>&1; then
        echo podman
      elif command -v docker >/dev/null 2>&1; then
        echo docker
      else
        echo missing
      fi

tasks:
  preflight:
    cmds:
      - |
          test "{{.RUNTIME}}" != "missing" || {
            echo "podman or docker is required"
            exit 1
          }
      - |
          test -n "{{.IMAGE_ARCHIVE}}" || {
            echo "No onboarder image archive found in {{.KLM_BUNDLE_DIR}}/files"
            echo "Copy your onboarder image tar into the onboarder bundle files/ directory before packaging."
            exit 1
          }

  load:
    desc: Load onboarder container image
    deps: [preflight]
    cmds:
      - "export TMPDIR=/var && $({{.RUNTIME}} load -i {{.IMAGE_ARCHIVE}} 2>&1 | tee /dev/stderr)"

  run:
    desc: Start onboarder container
    deps: [load]
    cmds:
      - '{{.RUNTIME}} run -it -d \
          --name "{{.CONTAINER_NAME}}" \
          --hostname onboarder-3.8.0 \
          "{{.IMAGE_REF}}" \
          /bin/bash

  shell:
    desc: Open onboarder shell
    interactive: true
    cmds:
      - "{{.RUNTIME}} exec -it {{.CONTAINER_NAME}} bash"

  stop:
    desc: Stop onboarder container
    cmds:
      - "{{.RUNTIME}} stop {{.CONTAINER_NAME}} >/dev/null"

  remove:
    desc: Remove onboarder container
    cmds:
      - "{{.RUNTIME}} rm {{.CONTAINER_NAME}} >/dev/null"

  prep:
    desc: Prep onboarder container
    deps: [run]
    cmds:
      - task: ansible-playbook
        vars:
          PLAYBOOK: ./actions/container/prep-container.yml
  
  node-prep:mcm:
    desc: Run node preparation for MCM cluster
    cmds:
      - task: ansible-playbook
        vars:
          PLAYBOOK: ./actions/hosts/node-prep.yml
          LIMIT: local

  node-prep:osms:
    desc: Run node preparation for OSMS cluster
    cmds:
      - task: ansible-playbook
        vars:
          PLAYBOOK: ./actions/hosts/node-prep.yml
          LIMIT: openspace-osms

  node-prep:osdc:
    desc: Run node preparation for OSDC server
    cmds:
      - task: ansible-playbook
        vars:
          PLAYBOOK: ./actions/hosts/node-prep.yml
          LIMIT: openspace-osdc

  mcm:deploy:
    desc: Deploy MCM cluster
    cmds:
      - task: make:rk2-cluster
      - task: make:bootstrap-container-images
      - task: make:helmfile-install
      - task: make:load-darksite-bundles
      - task: make:helmfile-install:rancher
      - task: make:terraform-rancher
      - task: make:install-gitea

  ansible-playbook:
    internal: true
    requires:
      vars: [PLAYBOOK]
    vars:
      LIMIT: '{{.LIMIT | default ""}}'
      EXTRA_VARS: '{{.EXTRA_VARS | default ""}}'
    cmds:
      - >
        ANSIBLE_CONFIG={{.ANSIBLE_CONFIG}}
        ansible-playbook
        -i {{.KLM_DEPLOYMENT_FILE}}
        {{.PLAYBOOK}}
        {{if .LIMIT}} --limit "{{.LIMIT}}" {{end}}
        {{if .EXTRA_VARS}} --extra-vars '{{.EXTRA_VARS}}' {{end}}