apiVersion: klm.kratos/v1
kind: Bundle

metadata:
  name: onboarder
  displayName: Onboarder
  version: 3.8.0

type: infrastructure

tasks:
  - id: load
    task: load
    label: Load Container Image
    description: Load the onboarder container image into Podman or Docker.

  - id: run
    task: run
    label: Run Container
    description: Start the onboarder container with the current KLM environment mounted.

  - id: configure
    task: configure
    label: Configure Onboarder
    description: Configure the onboarder container with necessary environment variables and settings.

  - id: verify
    task: verify
    label: Verify Configuration
    description: Run onboarder verification inside the container.

  - id: run
    task: run
    label: Run Onboarder
    description: Run Make commands inside the onboarder container to perform onboarding tasks.

  - id: shell
    task: shell
    label: shell
    interactive: true
    description: Open an interactive shell inside the onboarder container.

  - id: stop
    task: stop
    label: stop
    description: Stop and remove the onboarder container.
