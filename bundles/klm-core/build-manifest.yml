executables:
  - bin/klm-launcher.sh
  - cli/klm_cli.py
  - actions/init/init.sh
  - actions/tools/install-task.sh
  - actions/tools/install-ansible.sh
  - actions/env/install-launcher.sh
  - actions/env/install-profile.sh
  - actions/env/prep-env.sh
  - actions/env/write-env-file.sh
  - actions/env/write-global-env.sh
  - actions/bundles/install-bundles.sh

required_files:
  - manifest.yml
  - Taskfile.yml
  - actions/init/init.sh
  - actions/tools/install-task.sh
  - actions/tools/install-ansible.sh
  - images/task/task

required_dirs:
  - actions
  - bin
  - cli
  - images
  - images/task
  - images/ansible

include_files:
  - images/task/task
  - images/ansible/*

exclude:
  - build-manifest.yml
  - .git
  - .gitignore
  - "*.bundle"
  - tmp
  - logs
