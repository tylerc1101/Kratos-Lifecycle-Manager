[defaults]
inventory = ./deployment.yml

# Keep SSH host key checking enabled. Do not set this to False on STIG systems.
host_key_checking = False

# Avoid writing controller-side temp files under /root or /home.
local_tmp = /var/tmp/ansible-local

# Avoid remote module staging under /home/<user>/.ansible/tmp.
# Pre-create this on each managed node and make it owned by the SSH user.
remote_tmp = /var/tmp/ansible-remote

# Limit valid fallback temp dirs to /var/tmp. Avoid /tmp on hardened systems.
system_tmpdirs = /var/tmp

# Do not make temp module files world-readable.
allow_world_readable_tmpfiles = False

# Safer defaults for automation.
retry_files_enabled = False
interpreter_python = auto_silent
stdout_callback = default
bin_ansible_callbacks = True
deprecation_warnings = True
command_warnings = True

# Keep facts, but don't inject all facts as top-level vars.
inject_facts_as_vars = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Avoid Ansible defaulting to ~/.ansible/cp, which caused your /root/.ansible/cp error.
control_path_dir = /var/tmp/ansible-cp
control_path = %(directory)s/%%h-%%p-%%r

# Keep SSH multiplexing, but move the socket path somewhere controlled.
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=4

# Prefer SFTP over SCP.
transfer_method = sftp
sftp_batch_mode = True

# Enable only if sudo does NOT require tty on the managed hosts.
# If you get sudo/tty errors, set this to False.
pipelining = True

timeout = 30
retries = 2