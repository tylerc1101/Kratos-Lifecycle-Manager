name: klm-core
version: 0.1.0
type: infrastructure

description: KLM-Core provides the core components and automation for running the Kratos Lifecycle Manager (KLM)

taskfile:
  include: Taskfile.yml
  namespace: core
  flatten: true
  vars:
    global:
      KLM_HOME: "$KLM_HOME"
      KLM_ENV_NAME: "$KLM_ENV_NAME"
      KLM_ENV_DIR: "$KLM_ENV_DIR"
      KLM_BUNDLES_DIR: "$KLM_BUNDLES_DIR"
      KLM_DEPLOYMENT_FILE: "$KLM_DEPLOYMENT_FILE"
      ANSIBLE_CONFIG: "$KLM_ENV_DIR/ansible.cfg"
    include: {}

path:
  add:
    - bin

requires:
  commands:
    - python3
    - tar
