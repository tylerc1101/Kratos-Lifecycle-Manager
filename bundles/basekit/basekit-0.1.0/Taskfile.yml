version: '3'

tasks:
  render:
    desc: Render basekit generated files
    cmds:
      - mkdir -p "{{.KLM_GENERATED_DIR}}/basekit" "{{.KLM_INVENTORY_DIR}}"
      - |
          cat > "{{.KLM_GENERATED_DIR}}/basekit/README.txt" <<EOF
          Basekit render placeholder.
          Environment: {{.KLM_ENV_NAME}}
          Config: {{.KLM_CONFIG}}
          EOF
      - echo "[basekit] Render complete."

  apply:
    desc: Apply basekit architecture
    deps: [render]
    cmds:
      - echo "[basekit] Apply placeholder."
      - echo "[basekit] Put libvirt, VM, bridge, inventory, and architecture tasks here."

  verify:
    desc: Verify basekit architecture
    cmds:
      - test -f "{{.KLM_CONFIG}}"
      - echo "[basekit] Verify placeholder complete."
