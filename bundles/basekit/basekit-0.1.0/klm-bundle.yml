apiVersion: klm.kratos/v1
kind: Bundle

metadata:
  name: basekit
  displayName: Basekit
  version: 0.1.0

type: infrastructure

tasks:
  - id: render
    task: render
    label: render
    description: Render inventory and generated architecture files from deployment.yml.

  - id: apply
    task: apply
    label: apply
    description: Build or configure the base architecture.

  - id: verify
    task: verify
    label: verify
    description: Verify base architecture prerequisites and outputs.
