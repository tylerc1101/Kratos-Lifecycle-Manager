---
- name: Create requested OpenSpace VMs
  hosts: local:openspace-osms
  gather_facts: false
  become: true
  connection: local
  serial: 1

  vars:
    images_dir: /var/lib/libvirt/config/images

    mgmt_cidr: "{{ networks.bridges['br-mgmt'].cidr }}"
    mgmt_cidr_prefix: "{{ mgmt_cidr | regex_replace('^.*/', '') }}"
    mgmt_gateway: "{{ networks.bridges['br-mgmt'].gateway }}"
    mgmt_dns_servers: "{{ networks.dns_servers }}"

    vm_role: "{{ 'mcm' if 'mcm' in group_names else 'osms' }}"

    vm_name: "{{ vm_mcm_name if vm_role == 'mcm' else vm_osms_name }}"
    vm_memory: "{{ vm_mcm_memory if vm_role == 'mcm' else vm_osms_memory }}"
    vm_vcpus: "{{ vm_mcm_vcpus if vm_role == 'mcm' else vm_osms_vcpus }}"
    vm_disk_size: "{{ vm_mcm_disk_size if vm_role == 'mcm' else vm_osms_disk_size }}"
    vm_os_variant: "{{ vm_mcm_os_variant if vm_role == 'mcm' else vm_osms_os_variant }}"
    vm_network_bridge: "{{ vm_mcm_network_bridge if vm_role == 'mcm' else vm_osms_network_bridge }}"

    vm_backing_store: >-
      {{
        vm_mcm_backing_store
        if vm_role == 'mcm'
        else vm_osms_backing_store | default(images_dir ~ '/9_5_hardened_image_vm.qcow2')
      }}

    vm_mgmt_ip: >-
      {{
        mcm_nodes[0].mgmt_ip
        if vm_role == 'mcm'
        else osms_nodes[0].mgmt_ip
      }}

    vm_ifcfg_dir: "/tmp/{{ vm_name }}-network"
    vm_ifcfg_file: "{{ vm_ifcfg_dir }}/ifcfg-enp1s0"

  tasks:
    - name: Show selected VM role
      ansible.builtin.debug:
        msg: "Creating/checking {{ vm_role | upper }} VM {{ vm_name }} for inventory host {{ inventory_hostname }}"

    - name: Check if backing image exists
      ansible.builtin.stat:
        path: "{{ vm_backing_store }}"
      register: backing_image_stat
      failed_when: not backing_image_stat.stat.exists

    - name: Get list of existing VMs
      ansible.builtin.command: virsh list --all --name
      register: existing_vms
      changed_when: false

    - name: Check if VM already exists
      ansible.builtin.set_fact:
        vm_exists: "{{ vm_name in existing_vms.stdout_lines }}"

    - name: Create VM XML
      ansible.builtin.command:
        cmd: >
          virt-install
          --connect qemu:///system
          --virt-type kvm
          --name {{ vm_name }}
          --memory {{ vm_memory }}
          --vcpus {{ vm_vcpus }}
          --cpu host-passthrough
          --disk size={{ vm_disk_size }},backing_store="{{ vm_backing_store }}"
          --os-variant {{ vm_os_variant }}
          --network bridge={{ vm_network_bridge }},model=virtio
          --import
          --noautoconsole
          --graphics vnc
          --boot uefi
          --print-xml
      register: vm_xml
      when: not vm_exists

    - name: Define VM
      community.libvirt.virt:
        command: define
        xml: "{{ vm_xml.stdout }}"
      when: not vm_exists

    - name: Get VM disk path
      ansible.builtin.shell: |
        virsh domblklist {{ vm_name }} | awk '$1 == "vda" {print $2}'
      register: vm_disk
      changed_when: false
      when: not vm_exists

    - name: Create temporary network config directory
      ansible.builtin.file:
        path: "{{ vm_ifcfg_dir }}"
        state: directory
        mode: "0755"
      when: not vm_exists

    - name: Create network config
      ansible.builtin.copy:
        dest: "{{ vm_ifcfg_file }}"
        mode: "0644"
        content: |
          TYPE=Ethernet
          BOOTPROTO=static
          NAME=static-enp1s0
          DEVICE=enp1s0
          ONBOOT=yes
          IPADDR={{ vm_mgmt_ip }}
          PREFIX={{ mgmt_cidr_prefix }}
          GATEWAY={{ mgmt_gateway }}
          DNS1={{ mgmt_dns_servers[0] }}
          {% if mgmt_dns_servers | length > 1 %}
          DNS2={{ mgmt_dns_servers[1] }}
          {% endif %}
      when: not vm_exists

    - name: Inject network config into VM disk
      ansible.builtin.command:
        cmd: virt-copy-in -a {{ vm_disk.stdout }} {{ vm_ifcfg_file }} /etc/sysconfig/network-scripts/
      environment:
        LIBGUESTFS_BACKEND: direct
      when: not vm_exists

    - name: Remove temporary network config directory
      ansible.builtin.file:
        path: "{{ vm_ifcfg_dir }}"
        state: absent

    - name: Start VM
      community.libvirt.virt:
        name: "{{ vm_name }}"
        state: running
        autostart: true
      when: not vm_exists
      register: vm_start

    - name: Wait for VM SSH to be available
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 22
        delay: 120
        timeout: 900
      when:
        - vm_start is defined
        - vm_start.changed | default(false)


- name: Verify requested OpenSpace VMs after boot
  hosts: mcm:osms
  gather_facts: false

  tasks:
    - name: Verify SSH connectivity
      ansible.builtin.command: echo "SSH_OK"
      register: vm_ssh_test
      until: vm_ssh_test.stdout is search("SSH_OK")
      retries: 30
      delay: 30
      changed_when: false

    - name: Check uptime to detect if hardening reboots are complete
      ansible.builtin.command: cat /proc/uptime
      register: vm_uptime_raw
      until: (vm_uptime_raw.stdout.split()[0] | float) > 150
      retries: 20
      delay: 60
      changed_when: false