name: basekit
version: 0.1.0
type: infrastructure

description: OpenSpace reference architecture designed for minimal footprint deployments

taskfile:
  include: Taskfile.yml
  namespace: basekit

path:
  add: {}

provides: {}

requires:
  commands:
    - python3
    - tar

  bundles:
    - name: klm-core
      required: true
      reason: Base KLM runtime

    - name: onboarder
      required: false
      reason: Basekit requires Onboarder to deploy Rancher/Harbor/GitOps

  capabilities:
    - kubernetes
    - rancher
    - harbor
    - git
    - argocd
