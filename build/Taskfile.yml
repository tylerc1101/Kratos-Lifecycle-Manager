version: '3'

tasks:
  bundle:
    desc: Build all bundles
    cmds:
      - bash ./build-bundle.sh ../bundles/klm-core
      - bash ./build-bundle.sh ../bundles/onboarder
      - bash ./build-bundle.sh ../bundles/basekit
      - bash ./build-bundle.sh ../bundles/afcgi

  bundle:klm-core:
    desc: Build klm-core bundle
    cmds:
      - bash ./build-bundle.sh ../bundles/klm-core

  bundle:onboarder:
    cmds:
      - bash ./build-bundle.sh ../bundles/onboarder
