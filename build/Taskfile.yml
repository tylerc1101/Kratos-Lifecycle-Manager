version: '3'

vars:
  BUILD_SERVER: "10.243.77.213"
  SSH_USER: "kratos"
  REMOTE: "{{.SSH_USER}}@{{.BUILD_SERVER}}"
  SSH_OPTS: "-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/root/.ssh/known_hosts"

  KLM_DIR: "/opt/Kratos-Lifecycle-Manager"
  DIST_DIR: "{{.KLM_DIR}}/dist"
  LOCAL_DEPLOYMENT_FILE: "/home/kratos/deployment.yml"
  LOCAL_INIT_SCRIPT: "{{.KLM_DIR}}/klm-init.sh"

  REMOTE_STAGE_DIR: "/home/kratos/klm-stage"
  REMOTE_BUNDLE_DIR: "{{.REMOTE_STAGE_DIR}}/bundles"
  REMOTE_DEPLOYMENT_FILE: "{{.REMOTE_STAGE_DIR}}/deployment.yml"
  REMOTE_INIT_SCRIPT: "{{.REMOTE_STAGE_DIR}}/klm-init.sh"

  SUDOERS_FILE: "/etc/sudoers.d/{{.SSH_USER}}"

  ENV_NAME: "Lab"
  OPENSPACE_TASK: "/opt/openspace/bin/task"
  ENV_TASKFILE: "/opt/openspace/env/{{.ENV_NAME}}/Taskfile.yml"

  SYSTEMD_UNIT_NAME: "klm"
  SYSTEMD_LOG_DIR: "/var/log/klm"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  preflight:
    desc: Validate local files and remote access
    cmds:
      - test -f {{.LOCAL_DEPLOYMENT_FILE}} || { echo "Missing {{.LOCAL_DEPLOYMENT_FILE}}"; exit 1; }
      - test -f {{.LOCAL_INIT_SCRIPT}} || { echo "Missing {{.LOCAL_INIT_SCRIPT}}"; exit 1; }
      - test -d {{.DIST_DIR}} || sudo mkdir -p {{.DIST_DIR}}
      - ssh {{.SSH_OPTS}} -o BatchMode=yes -o ConnectTimeout=5 {{.REMOTE}} "echo Remote access OK"

  prereq:remote:sudo:
    desc: Ensure remote user has passwordless sudo
    interactive: true
    cmds:
      - |
        ssh {{.SSH_OPTS}} -tt {{.REMOTE}} '
          set -e

          if sudo -n true 2>/dev/null; then
            echo "[OK] {{.SSH_USER}} already has passwordless sudo"
            exit 0
          fi

          echo "[WARN] {{.SSH_USER}} does not have passwordless sudo"
          echo "[INFO] You may be prompted for the remote sudo password once."

          echo "{{.SSH_USER}} ALL=(ALL) NOPASSWD:ALL" | sudo tee {{.SUDOERS_FILE}} >/dev/null
          sudo chmod 0440 {{.SUDOERS_FILE}}
          sudo visudo -cf {{.SUDOERS_FILE}}

          sudo -n true
          echo "[OK] Passwordless sudo configured for {{.SSH_USER}}"
        '

  bundle:
    desc: Build all bundles
    cmds:
      - task: clean:bundles
      - task: bundle:klm-core
      - task: bundle:basekit
      - task: bundle:onboarder
      - task: bundle:verify

  bundle:klm-core:
    desc: Build klm-core bundle
    cmds:
      - bash ./build-bundle.sh ../bundles/klm-core

  bundle:basekit:
    desc: Build basekit bundle
    cmds:
      - bash ./build-bundle.sh ../bundles/basekit

  bundle:onboarder:
    desc: Build onboarder bundle
    cmds:
      - bash ./build-bundle.sh ../bundles/onboarder

  bundle:verify:
    desc: Verify bundle artifacts exist
    cmds:
      - test "$(find {{.DIST_DIR}} -maxdepth 1 -type f | wc -l)" -gt 0 || { echo "No bundles found in {{.DIST_DIR}}"; exit 1; }
      - ls -lh {{.DIST_DIR}}

  init:
    desc: Run local klm-init.sh for testing
    cmds:
      - sudo bash {{.LOCAL_INIT_SCRIPT}} --config {{.LOCAL_DEPLOYMENT_FILE}} --bundles {{.DIST_DIR}}/*

  test:
    desc: Clean, build bundles, and run local init test
    cmds:
      - task: clean
      - task: bundle
      - task: init

  clean:
    desc: Clean local runtime artifacts
    cmds:
      - sudo rm -rf -- /opt/openspace
      - sudo rm -f -- /etc/profile.d/klm.sh
      - sudo rm -f -- /etc/klm/klm.env

  clean:bundles:
    desc: Clean local bundle build artifacts
    cmds:
      - sudo mkdir -p {{.DIST_DIR}}
      - sudo rm -rf -- {{.DIST_DIR}}/*

  clean:full:
    desc: Clean local runtime, bundle artifacts, and installed packages
    interactive: true
    cmds:
      - test "{{.CONFIRM}}" = "yes" || { echo "Re-run with CONFIRM=yes"; exit 1; }
      - task: clean:bundles
      - task: clean
      - sudo dnf erase ansible ansible-core python3-cffi python3-cryptography python3-packaging python3-ply python3-pycparser python3-pyparsing python3-resolvelib sshpass -y

  deploy:init-only:
    desc: Build, copy, and run klm-init only
    interactive: true
    cmds:
      - task: preflight
      - task: prereq:remote:sudo
      - task: bundle
      - task: deploy:copy
      - task: deploy:run:klm-init

  deploy:full:
    desc: Build, copy, init, then start basekit full install as systemd unit
    interactive: true
    cmds:
      - task: deploy:init-only
      - task: deploy:run:basekit:full-install

  deploy:copy:
    desc: Stage deployment files and bundles on build server
    interactive: true
    cmds:
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "rm -rf {{.REMOTE_STAGE_DIR}} && mkdir -p {{.REMOTE_BUNDLE_DIR}}"
      - scp {{.SSH_OPTS}} {{.LOCAL_DEPLOYMENT_FILE}} {{.REMOTE}}:{{.REMOTE_DEPLOYMENT_FILE}}
      - scp {{.SSH_OPTS}} {{.LOCAL_INIT_SCRIPT}} {{.REMOTE}}:{{.REMOTE_INIT_SCRIPT}}
      - scp {{.SSH_OPTS}} {{.DIST_DIR}}/* {{.REMOTE}}:{{.REMOTE_BUNDLE_DIR}}/

  deploy:run:klm-init:
    desc: Run klm-init on build server
    interactive: true
    cmds:
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo bash {{.REMOTE_INIT_SCRIPT}} --config {{.REMOTE_DEPLOYMENT_FILE}} --bundles {{.REMOTE_BUNDLE_DIR}}/*"

  deploy:run:basekit:full-install:
    desc: Run basekit full install through the klm systemd unit
    interactive: true
    cmds:
      - task: remote:systemd-task
        vars:
          TASK: basekit:full-install

  remote:task:
    desc: Run an arbitrary OpenSpace task directly on the remote server
    interactive: true
    requires:
      vars: [TASK]
    cmds:
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo {{.OPENSPACE_TASK}} -t {{.ENV_TASKFILE}} {{.TASK}}"

  remote:systemd-task:
    desc: Run an OpenSpace task remotely through the stable klm systemd unit
    interactive: true
    requires:
      vars: [TASK]
    cmds:
      - |
        ssh {{.SSH_OPTS}} {{.REMOTE}} '
          set -e

          sudo mkdir -p {{.SYSTEMD_LOG_DIR}}

          if systemctl is-active --quiet {{.SYSTEMD_UNIT_NAME}}; then
            echo "[ERROR] {{.SYSTEMD_UNIT_NAME}} is already running."
            echo "Follow logs with:"
            echo "  sudo journalctl -u {{.SYSTEMD_UNIT_NAME}} -f"
            exit 1
          fi

          sudo systemctl reset-failed {{.SYSTEMD_UNIT_NAME}} 2>/dev/null || true

          sudo systemd-run \
            --unit={{.SYSTEMD_UNIT_NAME}} \
            --description="KLM remote task runner" \
            --property=Type=oneshot \
            --property=RemainAfterExit=yes \
            --property=StandardOutput=append:{{.SYSTEMD_LOG_DIR}}/{{.SYSTEMD_UNIT_NAME}}.log \
            --property=StandardError=append:{{.SYSTEMD_LOG_DIR}}/{{.SYSTEMD_UNIT_NAME}}.log \
            {{.OPENSPACE_TASK}} \
              -t {{.ENV_TASKFILE}} \
              {{.TASK}}

          echo "[OK] Started systemd unit: {{.SYSTEMD_UNIT_NAME}}"
          echo ""
          echo "Follow journal:"
          echo "  sudo journalctl -u {{.SYSTEMD_UNIT_NAME}} -f"
          echo ""
          echo "Follow persistent log:"
          echo "  sudo tail -f {{.SYSTEMD_LOG_DIR}}/{{.SYSTEMD_UNIT_NAME}}.log"
        '

  remote:systemd-status:
    desc: Check klm systemd unit status
    cmds:
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo systemctl status {{.SYSTEMD_UNIT_NAME}} --no-pager"

  remote:systemd-logs:
    desc: Follow klm systemd journal logs
    interactive: true
    cmds:
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo journalctl -u {{.SYSTEMD_UNIT_NAME}} -f"

  remote:systemd-log-file:
    desc: Follow persistent klm log file
    interactive: true
    cmds:
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo tail -f {{.SYSTEMD_LOG_DIR}}/{{.SYSTEMD_UNIT_NAME}}.log"

  remote:systemd-reset:
    desc: Reset failed klm unit state
    cmds:
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo systemctl reset-failed {{.SYSTEMD_UNIT_NAME}} || true"

  clean:deployment:
    desc: Clean remote deployment artifacts
    interactive: true
    cmds:
      - test "{{.CONFIRM}}" = "yes" || { echo "Re-run with CONFIRM=yes"; exit 1; }
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo truncate -s 0 /root/.ssh/known_hosts || true"
      - task: remote:task
        vars:
          TASK: basekit:osms-vm:destroy
        ignore_error: true
      - task: remote:task
        vars:
          TASK: basekit:mcm-vm:destroy
        ignore_error: true
      - task: remote:task
        vars:
          TASK: basekit:opnsense:destroy
        ignore_error: true
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo rm -rf -- /opt/openspace"
      - ssh {{.SSH_OPTS}} {{.REMOTE}} "sudo rm -rf -- {{.REMOTE_STAGE_DIR}}"