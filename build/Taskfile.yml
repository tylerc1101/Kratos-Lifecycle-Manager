version: '3'

vars:
  BUILD_SERVER: "10.243.76.38"

tasks:
  bundle:
    desc: Build all bundles
    cmds:
      - task: bundle:klm-core
      - task: bundle:basekit
      #- bash ./build-bundle.sh ../bundles/basekit
      #- bash ./build-bundle.sh ../bundles/afcgi

  bundle:klm-core:
    desc: Build klm-core bundle
    cmds:
      - bash ./build-bundle.sh ../bundles/klm-core

  bundle:basekit:
    desc: Build basekit bundle
    cmds:
      - bash ./build-bundle.sh ../bundles/basekit

  bundle:onboarder:
    cmds:
      - bash ./build-bundle.sh ../bundles/onboarder

  test:
    desc: Run all tests
    cmds:
      - task: clean
      - task: bundle
      - task: init

  init:
    desc: Run klm-core init.sh for testing
    cmds:
      - bash /opt/Kratos-Lifecycle-Manager/klm-init.sh --config /home/kratos/deployment.yml --bundles /opt/Kratos-Lifecycle-Manager/dist/*

  clean:full:
    desc: Clean build artifacts
    cmds:
      - rm -rf /opt/Kratos-Lifecycle-Manager/dist/*
      - rm -rf /opt/openspace
      - rm -rf /etc/profile.d/klm.sh
      - rm -rf /etc/klm/klm.env
      - dnf erase ansible ansible-core python3-cffi python3-cryptography python3-packaging python3-ply python3-pycparser python3-pyparsing python3-resolvelib sshpass -y

  clean:
    desc: Clean minor artifacts
    cmds:
      - rm -rf /opt/Kratos-Lifecycle-Manager/dist/*
      - rm -rf /opt/openspace
      - rm -rf /etc/profile.d/klm.sh
      - rm -rf /etc/klm/klm.env

  deploy:
    desc: build and deploy basekit bundle
    interactive: true
    cmds:
      - task: test
      - 'scp /home/kratos/deployment.yml kratos@{{.BUILD_SERVER}}:/home/kratos'
      - 'scp /opt/Kratos-Lifecycle-Manager/klm-init.sh kratos@{{.BUILD_SERVER}}:/home/kratos'
      - 'ssh kratos@{{.BUILD_SERVER}} "mkdir -p /home/kratos/bundles"'
      - 'scp /opt/Kratos-Lifecycle-Manager/dist/* kratos@{{.BUILD_SERVER}}:/home/kratos/bundles'
      - 'ssh kratos@{{.BUILD_SERVER}} "sudo bash /home/kratos/klm-init.sh --config /home/kratos/deployment.yml --bundles /home/kratos/bundles/*"'

  clean:deployment:
    desc: Clean deployment artifacts
    cmds:
      - 'ssh kratos@{{.BUILD_SERVER}} "sudo rm -rf /var/lib/libvirt"'
      - 'ssh kratos@{{.BUILD_SERVER}} "sudo rm -rf /opt/openspace"'
      - 'ssh kratos@{{.BUILD_SERVER}} "sudo rm -rf /home/kratos/deployment.yml"'
      - 'ssh kratos@{{.BUILD_SERVER}} "sudo rm -rf /home/kratos/klm-init.sh"'
      - 'ssh kratos@{{.BUILD_SERVER}} "sudo rm -rf /home/kratos/bundles/*"'